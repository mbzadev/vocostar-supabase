                SMS_MESSAGEBIRD_ORIGINATOR: process.env.GOTRUE_SMS_MESSAGEBIRD_ORIGINATOR || '',
                SMS_OTP_EXP: parseInt(process.env.GOTRUE_SMS_OTP_EXP || '0', 10),
