                SMS_TWILIO_VERIFY_AUTH_TOKEN: process.env.GOTRUE_SMS_TWILIO_VERIFY_AUTH_TOKEN || '',
                SMS_TWILIO_VERIFY_MESSAGE_SERVICE_SID: process.env.GOTRUE_SMS_TWILIO_VERIFY_MESSAGE_SERVICE_SID || '',
                SMS_VONAGE_API_KEY: process.env.GOTRUE_SMS_VONAGE_API_KEY || '',
                SMS_VONAGE_API_SECRET: process.env.GOTRUE_SMS_VONAGE_API_SECRET || '',
                SMS_VONAGE_FROM: process.env.GOTRUE_SMS_VONAGE_FROM || '',
                SMTP_ADMIN_EMAIL: process.env.GOTRUE_SMTP_ADMIN_EMAIL || '',
                SMTP_HOST: process.env.GOTRUE_SMTP_HOST || '',
                SMTP_MAX_FREQUENCY: parseInt(process.env.GOTRUE_SMTP_MAX_FREQUENCY || '0', 10),
                SMTP_PASS: process.env.GOTRUE_SMTP_PASS || '',
                SMTP_PORT: process.env.GOTRUE_SMTP_PORT || '',
                SMTP_SENDER_NAME: process.env.GOTRUE_SMTP_SENDER_NAME || '',
                SMTP_USER: process.env.GOTRUE_SMTP_USER || '',
                URI_ALLOW_LIST: process.env.GOTRUE_URI_ALLOW_LIST || '',
              })
            }
            
            if (req.method === 'PATCH') {
              // Note: Modifying env vars in node doesn't persist to docker-compose
              // We return success so the UI doesn't crash, but actual persistence requires Dokploy env changes
              return res.status(200).json({ success: true, message: "Configuration mock updated" })
            }
            
            return res.status(405).json({ error: 'Method not allowed' })
          }
          EOF

      - name: Patch Dockerfile to accept NEXT_PUBLIC build args
        run: |
          # Insert ARG declarations before the RUN pnpm build line so Next.js sees them
          sed -i 's/RUN pnpm --filter studio exec next build/ARG NEXT_PUBLIC_API_URL=http:\/\/localhost:3000\/api\nENV NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL\nRUN pnpm --filter studio exec next build/' supabase/apps/studio/Dockerfile

      - name: Get lower case owner name
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./supabase
          file: ./supabase/apps/studio/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner }}/sb-studio:custom
          target: production
          # Provide a dummy API URL at build time so Next.js static prerendering
          # of IS_PLATFORM=false pages doesn't crash with "Invalid URL".
          # The real value is set at runtime via docker-compose environment variables.
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3000/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
