name: Build Custom Studio Docker Image

on:
  push:
    paths:
      - 'apps/studio/**'
      - '.github/workflows/build-studio.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Patch Dockerfile to accept NEXT_PUBLIC build args
        run: |
          # Insert ARG declarations before the RUN pnpm build line so Next.js sees them
          sed -i 's/RUN pnpm --filter studio exec next build/ARG NEXT_PUBLIC_API_URL=http:\/\/localhost:3000\/api\nENV NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL\nRUN pnpm --filter studio exec next build/' apps/studio/Dockerfile

      - name: Get lower case owner name
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/studio/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner }}/sb-studio:latest
          target: production
          # Provide a dummy API URL at build time so Next.js static prerendering
          # of IS_PLATFORM=false pages doesn't crash with "Invalid URL".
          # The real value is set at runtime via docker-compose environment variables.
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3000/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
