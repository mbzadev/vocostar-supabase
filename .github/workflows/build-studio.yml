name: Build Custom Studio Docker Image

on:
  push:
    paths:
      - '.github/workflows/build-studio.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Supabase Repository
        uses: actions/checkout@v4
        with:
          repository: supabase/supabase
          # Checkout the commit matching 2026.03.04-sha-0043607
          ref: 00436076bbd542f8e9593ae13811dee1cf353f19
          path: supabase

      - name: Patch AuthLayout UI to show all Auth configuration menus
        run: |
          # Replace IS_PLATFORM with true only in the Auth sidebar menu file
          # This shows hidden Auth menus (Sign In / Providers, Sessions, Auth Hooks, etc.)
          # without affecting the rest of the app (especially API_URL computation)
          sed -i "s/IS_PLATFORM/true/g" supabase/apps/studio/components/layouts/AuthLayout/AuthLayout.utils.ts
          # Clean up the now-unused import from the patched file
          sed -i "s/import { true } from 'lib\/constants'//g" supabase/apps/studio/components/layouts/AuthLayout/AuthLayout.utils.ts
          echo "=== Patched file preview ==="
          head -5 supabase/apps/studio/components/layouts/AuthLayout/AuthLayout.utils.ts

      - name: Create missing Auth Config API route
        run: |
          mkdir -p supabase/apps/studio/pages/api/platform/auth/\[ref\]
          cat << 'EOF' > supabase/apps/studio/pages/api/platform/auth/\[ref\]/config.ts
          import { NextApiRequest, NextApiResponse } from 'next'

          export default async function handler(req: NextApiRequest, res: NextApiResponse) {
            if (req.method === 'GET') {
              return res.status(200).json({
                API_MAX_REQUEST_DURATION: parseInt(process.env.GOTRUE_API_MAX_REQUEST_DURATION || '0', 10),
                AUDIT_LOG_DISABLE_POSTGRES: process.env.GOTRUE_AUDIT_LOG_DISABLE_POSTGRES === 'true' || false,
                CUSTOM_OAUTH_ENABLED: process.env.GOTRUE_CUSTOM_OAUTH_ENABLED === 'true' || false,
                CUSTOM_OAUTH_MAX_PROVIDERS: parseInt(process.env.GOTRUE_CUSTOM_OAUTH_MAX_PROVIDERS || '0', 10),
                DB_MAX_POOL_SIZE: parseInt(process.env.GOTRUE_DB_MAX_POOL_SIZE || '0', 10),
                DB_MAX_POOL_SIZE_UNIT: process.env.GOTRUE_DB_MAX_POOL_SIZE_UNIT || '',
                DISABLE_SIGNUP: process.env.GOTRUE_DISABLE_SIGNUP === 'true' || false,
                EXTERNAL_ANONYMOUS_USERS_ENABLED: process.env.GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED === 'true' || false,
                EXTERNAL_APPLE_ADDITIONAL_CLIENT_IDS: process.env.GOTRUE_EXTERNAL_APPLE_ADDITIONAL_CLIENT_IDS || '',
                EXTERNAL_APPLE_CLIENT_ID: process.env.GOTRUE_EXTERNAL_APPLE_CLIENT_ID || '',
                EXTERNAL_APPLE_EMAIL_OPTIONAL: process.env.GOTRUE_EXTERNAL_APPLE_EMAIL_OPTIONAL === 'true' || false,
                EXTERNAL_APPLE_ENABLED: process.env.GOTRUE_EXTERNAL_APPLE_ENABLED === 'true' || false,
                EXTERNAL_APPLE_SECRET: process.env.GOTRUE_EXTERNAL_APPLE_SECRET || '',
                EXTERNAL_AZURE_CLIENT_ID: process.env.GOTRUE_EXTERNAL_AZURE_CLIENT_ID || '',
                EXTERNAL_AZURE_EMAIL_OPTIONAL: process.env.GOTRUE_EXTERNAL_AZURE_EMAIL_OPTIONAL === 'true' || false,
                EXTERNAL_AZURE_ENABLED: process.env.GOTRUE_EXTERNAL_AZURE_ENABLED === 'true' || false,
                EXTERNAL_AZURE_SECRET: process.env.GOTRUE_EXTERNAL_AZURE_SECRET || '',
                EXTERNAL_AZURE_URL: process.env.GOTRUE_EXTERNAL_AZURE_URL || '',
