receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  hostmetrics:
    collection_interval: 60s
    scrapers:
      cpu: {}
      disk: {}
      load: {}
      filesystem: {}
      memory: {}
      network: {}
      paging: {}
      process:
        mute_process_name_error: true
        mute_process_exe_error: true
        mute_process_io_error: true
      processes: {}
  prometheus:
    config:
      scrape_configs:
        - job_name: "MySupabaseJob"
          metrics_path: "/customer/v1/privileged/metrics"
          scheme: https
          # Only use basic_auth if SUPABASE_SERVICE_ROLE_JWT is provided
          # basic_auth:
          #   username: "service_role"
          #   password: "${env:SUPABASE_SERVICE_ROLE_JWT}"
          static_configs:
            - targets: ["${env:SUPABASE_METRICS_TARGET}"]
              labels:
                group: "MyGroupLabel"
  filelog:
    include:
      - /var/lib/docker/containers/*/*.log
    start_at: beginning
    include_file_path: true
    include_file_name: false
    operators:
      - type: json_parser
        id: parse_docker
        timestamp:
          parse_from: attributes.time
          layout: '%Y-%m-%dT%H:%M:%S.%fZ'
      - type: move
        from: attributes.log
        to: body
      - type: remove
        field: attributes.time

processors:
  batch:
    send_batch_size: 1000
    timeout: 10s
  resourcedetection:
    detectors: [env, system, docker]

exporters:
  otlphttp:
    endpoint: https://${env:SIGNOZ_ENDPOINT}
    tls:
      insecure: false

service:
  pipelines:
    metrics:
      receivers: [otlp, hostmetrics, prometheus]
      processors: [batch, resourcedetection]
      exporters: [otlphttp]
    traces:
      receivers: [otlp]
      processors: [batch, resourcedetection]
      exporters: [otlphttp]
    logs:
      receivers: [otlp, filelog]
      processors: [batch, resourcedetection]
      exporters: [otlphttp]
