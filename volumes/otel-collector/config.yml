receivers:
  # OTLP: accept traces, metrics, and logs from instrumented apps
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Host metrics: CPU, disk, memory, network, etc.
  hostmetrics:
    collection_interval: 60s
    root_path: /hostfs
    scrapers:
      cpu: {}
      disk: {}
      load: {}
      filesystem: {}
      memory: {}
      network: {}
      paging: {}
      process:
        mute_process_name_error: true
        mute_process_exe_error: true
        mute_process_io_error: true
        mute_process_user_error: true
      processes: {}

  # Container metrics from Docker daemon
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 10s
    timeout: 20s

  # Container logs: Docker JSON log files
  filelog:
    include:
      - /var/lib/docker/containers/*/*-json.log
    start_at: beginning
    include_file_name: false
    include_file_path: true
    operators:
      - id: container-parser
        type: container
        format: docker
        add_metadata_from_filepath: false

  # Supabase Prometheus metrics
  prometheus:
    config:
      scrape_configs:
        - job_name: "MySupabaseJob"
          metrics_path: "/customer/v1/privileged/metrics"
          scheme: https
          tls_config:
            insecure_skip_verify: true
          basic_auth:
            username: "service_role"
            password: "${env:SERVICE_ROLE_KEY}"
          static_configs:
            - targets: ["${env:SUPABASE_METRICS_TARGET}"]
              labels:
                group: "MyGroupLabel"

processors:
  batch:
    send_batch_size: 1000
    timeout: 10s
  resourcedetection:
    detectors: [env, system, docker]
    timeout: 2s
    system:
      hostname_sources: [os]
  memory_limiter:
    check_interval: 5s
    limit_mib: 4000
    spike_limit_mib: 800

exporters:
  otlphttp:
    endpoint: ${env:SIGNOZ_ENDPOINT}
    tls:
      insecure: false
      insecure_skip_verify: true
    headers:
      signoz-ingestion-key: ${env:SIGNOZ_INGESTION_KEY}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlphttp]
    metrics:
      receivers: [otlp, hostmetrics, docker_stats, prometheus]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlphttp]
    logs:
      receivers: [otlp, filelog]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlphttp]
