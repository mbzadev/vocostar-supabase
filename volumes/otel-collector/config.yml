receivers:
  # OTLP: accept traces, metrics, and logs from instrumented apps
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Host metrics: CPU, disk, memory, network, etc.
  hostmetrics:
    collection_interval: 60s
    root_path: /hostfs
    scrapers:
      cpu: {}
      disk: {}
      load: {}
      filesystem: {}
      memory: {}
      network: {}
      paging: {}
      processes: {}

  # Container metrics from Docker daemon
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 10s
    timeout: 20s

  # Container logs: Docker JSON log files
  filelog:
    include:
      - /var/lib/docker/containers/*/*-json.log
    start_at: beginning
    include_file_name: false
    include_file_path: true
    operators:
      - id: container-parser
        type: container
        format: docker
        add_metadata_from_filepath: false

  # Supabase internal service metrics (self-hosted only)
  prometheus:
    config:
      scrape_configs:
        - job_name: "supabase-auth"
          metrics_path: "/metrics"
          static_configs:
            - targets: ["auth:9999"]
              labels:
                service: "supabase-auth"
        - job_name: "supabase-rest"
          metrics_path: "/metrics"
          static_configs:
            - targets: ["rest:3000"]
              labels:
                service: "supabase-rest"
        - job_name: "supabase-storage"
          metrics_path: "/metrics"
          static_configs:
            - targets: ["storage:5000"]
              labels:
                service: "supabase-storage"
        - job_name: "supabase-realtime"
          metrics_path: "/metrics"
          static_configs:
            - targets: ["realtime-dev.supabase-realtime:4000"]
              labels:
                service: "supabase-realtime"

processors:
  batch:
    send_batch_size: 1000
    timeout: 10s
  resourcedetection:
    detectors: [env, system, docker]
    timeout: 2s
    system:
      hostname_sources: [os]
  memory_limiter:
    check_interval: 5s
    limit_mib: 4000
    spike_limit_mib: 800

exporters:
  otlphttp:
    endpoint: ${env:SIGNOZ_ENDPOINT}
    tls:
      insecure: false
      insecure_skip_verify: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlphttp]
    metrics:
      receivers: [otlp, hostmetrics, docker_stats, prometheus]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlphttp]
    logs:
      receivers: [otlp, filelog]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlphttp]
